version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: timekeeper-backend
    env_file:
      - .env
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - .:/app
      - /app/node_modules
    # Connects to an existing external MSSQL server via DB_SERVER env

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: timekeeper-web
    environment:
      - VITE_BACKEND_URL=http://backend:5000
      - VITE_API_BASE_URL=/api
      - VITE_USE_RELATIVE_API_URL=true
    ports:
      - "9000:9000"
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
